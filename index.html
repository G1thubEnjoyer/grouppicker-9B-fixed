<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Randomizer — 9B</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb;
    --ink: #1a1a18;
    --surface: #ffffff;
    --border: #d8d4c8;
    --accent: #e8521a;
    --accent2: #1a6ee8;
    --muted: #8a8680;
    --male: #1a6ee8;
    --female: #d4006e;
    --tag-m-bg: #ddeaff;
    --tag-f-bg: #ffe0f0;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
  }

  /* grain overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.6;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative; z-index: 1;
  }

  /* ── HEADER ── */
  header {
    margin-bottom: 44px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 20px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--ink);
  }
  header h1 span { color: var(--accent); }

  .header-meta {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .meta-chip {
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--ink); color: var(--bg);
    padding: 4px 10px; border-radius: 4px;
  }
  .meta-chip.blue { background: var(--male); }
  .meta-chip.pink { background: var(--female); }

  /* ── RULE CARD ── */
  .rule-card {
    background: var(--ink);
    color: var(--bg);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .rule-icon { font-size: 1.4rem; flex-shrink: 0; }
  .rule-text { font-size: 0.8rem; line-height: 1.6; }
  .rule-text strong { font-weight: 500; color: #ffd87a; }

  /* ── ACTION ROW ── */
  .action-row {
    display: flex; gap: 10px; margin-bottom: 36px; flex-wrap: wrap;
  }

  .btn-main {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px 32px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: transform 0.13s, box-shadow 0.13s, filter 0.13s;
    box-shadow: 0 4px 0 #a33610;
  }
  .btn-main:hover { transform: translateY(-2px); filter: brightness(1.06); }
  .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #a33610; }
  .btn-main.go { animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .btn-copy-all {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.76rem;
    background: var(--surface);
    color: var(--muted);
    border: 1.5px solid var(--border);
    padding: 14px 20px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.13s, color 0.13s, transform 0.13s;
    display: none;
  }
  .btn-copy-all:hover { border-color: var(--ink); color: var(--ink); transform: translateY(-1px); }
  .btn-copy-all.copied { border-color: #2a8a5a; color: #2a8a5a; }

  /* ── ERROR ── */
  .error-msg {
    background: #fff0ee;
    border: 1.5px solid #f5b4a4;
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 0.78rem;
    color: #c0391a;
    margin-bottom: 20px;
    display: none;
  }

  /* ── GROUPS ── */
  .groups-wrap {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .group-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(16px);
    animation: cardIn 0.38s ease forwards;
  }
  @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

  /* alternating accent stripe on top */
  .group-card:nth-child(odd)  .card-stripe { background: var(--accent); }
  .group-card:nth-child(even) .card-stripe { background: var(--accent2); }
  .card-stripe { height: 4px; }

  .card-head {
    padding: 10px 13px 8px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .card-head-left { display: flex; align-items: center; gap: 8px; }

  .card-num {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900; font-size: 1rem;
    color: var(--ink); line-height: 1;
  }

  .size-tag {
    font-size: 0.62rem; letter-spacing: 0.06em;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--muted); padding: 2px 7px; border-radius: 100px;
  }

  .card-head-right { display: flex; align-items: center; gap: 6px; }

  .gender-pill {
    font-size: 0.62rem; font-weight: 500; letter-spacing: 0.04em;
    padding: 2px 7px; border-radius: 100px;
  }
  .gender-pill.m { background: var(--tag-m-bg); color: var(--male); }
  .gender-pill.f { background: var(--tag-f-bg); color: var(--female); }

  .btn-card-copy {
    width: 24px; height: 24px; border-radius: 5px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .btn-card-copy:hover { border-color: var(--ink); color: var(--ink); background: var(--bg); }
  .btn-card-copy.copied { border-color: #2a8a5a; color: #2a8a5a; }

  .member-list { padding: 6px 0 8px; }

  .member-row {
    display: flex; align-items: center; gap: 9px;
    padding: 5px 13px; font-size: 0.79rem;
    transition: background 0.1s;
  }
  .member-row:hover { background: var(--bg); }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.m { background: var(--male); }
  .dot.f { background: var(--female); }

  /* ── PLACEHOLDER ── */
  .placeholder {
    grid-column: 1 / -1;
    text-align: center; padding: 64px 20px;
    color: var(--muted); font-size: 0.82rem;
    border: 2px dashed var(--border); border-radius: var(--radius);
  }
  .placeholder big { display: block; font-size: 2.8rem; margin-bottom: 10px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--ink); color: var(--bg);
    font-size: 0.76rem; padding: 8px 18px;
    border-radius: 100px; opacity: 0; pointer-events: none;
    transition: opacity 0.18s, transform 0.18s; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>9B Groups<span>.</span></h1>
    <div class="header-meta">
      <span class="meta-chip">36 students</span>
      <span class="meta-chip blue">♂ 20</span>
      <span class="meta-chip pink">♀ 16</span>
    </div>
  </header>

  <div class="rule-card">
    <span class="rule-icon">⚖</span>
    <div class="rule-text">
      <strong>8 groups total</strong> — 4 groups of 5 people · 4 groups of 4 people<br>
      Every group gets <strong>at least 2 boys and 2 girls</strong>, guaranteed.
    </div>
  </div>

  <div class="action-row">
    <button class="btn-main" id="randomizeBtn">⇄ Randomize</button>
    <button class="btn-copy-all" id="copyAllBtn">⎘ Copy All</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="groups-wrap" id="output">
    <div class="placeholder">
      <big>⇄</big>
      Hit Randomize to assign groups
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const STUDENTS = [
  {name:"Abram",g:"m"},{name:"Jovan",g:"m"},{name:"Allura",g:"f"},
  {name:"Melvin",g:"m"},{name:"Olive",g:"f"},{name:"Dhea",g:"f"},
  {name:"Naya",g:"f"},{name:"Noel",g:"m"},{name:"Alena",g:"f"},
  {name:"Nuel",g:"m"},{name:"Evelyn",g:"f"},{name:"Dimas",g:"m"},
  {name:"Ella",g:"f"},{name:"Tristan",g:"m"},{name:"Oneil",g:"m"},
  {name:"Hizkia",g:"m"},{name:"Kamila",g:"f"},{name:"Jeje",g:"f"},
  {name:"Jessica",g:"f"},{name:"Richelle",g:"f"},{name:"Joan",g:"f"},
  {name:"Kanaya Tirza",g:"f"},{name:"Laudya",g:"f"},{name:"Richie",g:"m"},
  {name:"Jova",g:"m"},{name:"Reynard",g:"m"},{name:"Michael",g:"m"},
  {name:"Mitha",g:"f"},{name:"Nicho",g:"m"},{name:"Villa",g:"m"},
  {name:"Samuel",g:"m"},{name:"Gratias",g:"m"},{name:"Russel",g:"m"},
  {name:"Kierana",g:"f"},{name:"Kenzie",g:"m"},{name:"Jagat",g:"m"},
];

// Fixed layout: 4 groups of 5, 4 groups of 4
// Total: 20 + 16 = 36 ✓
// Males: 20 → distribute across 8 groups, min 2 each = 16 min, 4 extra
// Females: 16 → distribute across 8 groups, min 2 each = 16 min, 0 extra
// So females get exactly 2 per group, males get 2 or 3 per group.
// Groups of 5: 3M + 2F = 5  (×4 = 12M + 8F)
// Groups of 4: 2M + 2F = 4  (×4 = 8M + 8F)
// Total: 20M + 16F = 36 ✓  Perfect.

const GROUP_SIZES = [5,5,5,5,4,4,4,4]; // always this

let lastGroups = null;
const output       = document.getElementById("output");
const errorMsg     = document.getElementById("errorMsg");
const randomizeBtn = document.getElementById("randomizeBtn");
const copyAllBtn   = document.getElementById("copyAllBtn");
const toast        = document.getElementById("toast");

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randomize() {
  errorMsg.style.display = "none";
  randomizeBtn.classList.add("go");
  setTimeout(() => randomizeBtn.classList.remove("go"), 300);

  // Shuffle both pools
  const males   = shuffle(STUDENTS.filter(s => s.g === "m")); // 20
  const females = shuffle(STUDENTS.filter(s => s.g === "f")); // 16

  // Shuffle group order (which groups get 5 vs 4 is random)
  const sizes = shuffle([...GROUP_SIZES]);

  // Allocate: groups of 5 → 3M+2F, groups of 4 → 2M+2F
  const groups = [];
  let mi = 0, fi = 0;

  for (const size of sizes) {
    const mCount = size === 5 ? 3 : 2;
    const fCount = 2;
    const members = shuffle([
      ...males.slice(mi, mi + mCount),
      ...females.slice(fi, fi + fCount),
    ]);
    groups.push({ members, size });
    mi += mCount;
    fi += fCount;
  }

  lastGroups = groups;
  render(groups);
  copyAllBtn.style.display = "inline-block";
  copyAllBtn.classList.remove("copied");
  copyAllBtn.textContent = "⎘ Copy All";
}

function render(groups) {
  output.innerHTML = "";
  groups.forEach(({ members, size }, i) => {
    const mc = members.filter(m => m.g === "m").length;
    const fc = members.filter(m => m.g === "f").length;

    const card = document.createElement("div");
    card.className = "group-card";
    card.style.animationDelay = `${i * 0.055}s`;
    card.innerHTML = `
      <div class="card-stripe"></div>
      <div class="card-head">
        <div class="card-head-left">
          <span class="card-num">${i + 1}</span>
          <span class="size-tag">${size} people</span>
        </div>
        <div class="card-head-right">
          <span class="gender-pill m">♂ ${mc}</span>
          <span class="gender-pill f">♀ ${fc}</span>
          <button class="btn-card-copy" data-i="${i}" title="Copy">⎘</button>
        </div>
      </div>
      <div class="member-list">
        ${members.map(m => `
          <div class="member-row">
            <span class="dot ${m.g}"></span>
            <span>${m.name}</span>
          </div>
        `).join("")}
      </div>
    `;
    output.appendChild(card);
  });

  document.querySelectorAll(".btn-card-copy").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = parseInt(btn.dataset.i);
      const grp = lastGroups[i].members;
      const text = `Group ${i+1}:\n` + grp.map(m => `  ${m.name} (${m.g==="m"?"M":"F"})`).join("\n");
      doCopy(text, btn, `Group ${i+1} copied!`);
    });
  });
}

function doCopy(text, btn, msg) {
  navigator.clipboard.writeText(text).then(() => {
    if (btn) {
      btn.classList.add("copied"); btn.textContent = "✓";
      setTimeout(() => { btn.classList.remove("copied"); btn.textContent = "⎘"; }, 1800);
    }
    showToast(msg);
  });
}

copyAllBtn.addEventListener("click", () => {
  if (!lastGroups) return;
  const text = lastGroups.map(({members}, i) =>
    `Group ${i+1}:\n` + members.map(m => `  ${m.name} (${m.g==="m"?"M":"F"})`).join("\n")
  ).join("\n\n");
  doCopy(text, null, "All groups copied!");
  copyAllBtn.classList.add("copied");
  copyAllBtn.textContent = "✓ Copied!";
  setTimeout(() => { copyAllBtn.classList.remove("copied"); copyAllBtn.textContent = "⎘ Copy All"; }, 1800);
});

let toastT;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => toast.classList.remove("show"), 2000);
}

randomizeBtn.addEventListener("click", randomize);
</script>
</body>
</html>
